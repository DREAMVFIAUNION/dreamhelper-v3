# ═══════════════════════════════════════════════════════════
# 梦帮小助 v4.0 · 本地开发环境 (极简)
#
# 默认只启动 PostgreSQL + Redis (pnpm start 自动管理)
# 可选服务: 取消注释 milvus / elasticsearch / minio 按需启用
# 应用服务: 由 pnpm start 直接运行 (不再容器化)
# ═══════════════════════════════════════════════════════════

services:
  # ─── 核心基础设施 (pnpm start 自动启动) ─────────────────
  postgres:
    image: postgres:17-alpine
    container_name: dreamhelp-postgres
    ports:
      - '127.0.0.1:5433:5432'
    environment:
      POSTGRES_DB: dreamhelp
      POSTGRES_USER: dreamhelp
      POSTGRES_PASSWORD: dev_password
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dreamhelp']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: dreamhelp-redis
    ports:
      - '127.0.0.1:6379:6379'
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

