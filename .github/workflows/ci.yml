name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'
  PNPM_VERSION: '9'

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --shamefully-hoist

      - name: Generate Prisma client
        run: pnpm --filter @dreamhelp/database generate

      - name: Type check web portal
        run: pnpm --filter @dreamhelp/web-portal exec tsc --noEmit
        continue-on-error: true

      - name: Build web portal
        run: pnpm --filter @dreamhelp/web-portal build
        env:
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-portal-build
          path: apps/web-portal/.next
          retention-days: 1

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --shamefully-hoist

      - name: Generate Prisma client
        run: pnpm --filter @dreamhelp/database generate

      - name: Run web portal tests
        run: pnpm --filter @dreamhelp/web-portal test
        env:
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake
          JWT_SECRET: ci-secret
          BRAIN_CORE_URL: http://127.0.0.1:8000

  test-gateway:
    name: Gateway Tests
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --shamefully-hoist

      - name: Generate Prisma client
        run: pnpm --filter @dreamhelp/database generate

      - name: Build gateway
        run: pnpm --filter @dreamhelp/gateway build

      - name: Run gateway tests
        run: pnpm --filter @dreamhelp/gateway test

  test-backend:
    name: brain-core Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('services/brain-core/requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install Python dependencies
        run: |
          cd services/brain-core
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run stable brain-core smoke suite
        run: |
          cd services/brain-core
          pytest tests/test_smoke.py tests/test_service_entrypoint.py -q --tb=short

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-frontend, test-gateway, test-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web portal image
        run: docker build -f apps/web-portal/Dockerfile -t dreamhelp-web:${{ github.sha }} .

      - name: Build brain-core image
        run: docker build -f services/brain-core/Dockerfile -t dreamhelp-brain:${{ github.sha }} services/brain-core/

      - name: Build gateway image
        run: docker build -f services/gateway/Dockerfile -t dreamhelp-gateway:${{ github.sha }} .

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint-and-build, test-frontend, test-gateway, test-backend, docker-build]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.lint-and-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Tests | ${{ needs.test-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Gateway Tests | ${{ needs.test-gateway.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| brain-core Smoke Tests | ${{ needs.test-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY
